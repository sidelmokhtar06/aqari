<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aqari | عقاري — Annonces immobilières à Nouakchott</title>
  <meta name="description" content="Parcourez les annonces immobilières à Nouakchott — appartements, villas, terrains, bureaux et commerces. Filtrez par type, zone et prix.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Aqari">
  <meta property="og:title" content="Annonces immobilières à Nouakchott — Aqari">
  <meta property="og:description" content="Appartements, villas, terrains, bureaux et commerces à Nouakchott. Achat et location.">
  <meta property="og:image" content="https://images.unsplash.com/photo-1568605114967-8130f3a36994?auto=format&fit=crop&w=1200&q=70">
  <meta name="twitter:card" content="summary_large_image">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/rtl.css">
</head>
<body class="bg-bg text-text-main min-h-screen flex flex-col">

  <!-- Navbar -->
  <header data-nav class="aq-nav sticky top-0 z-40 bg-surface/90 border-b border-border-subtle transition-shadow">
    <nav class="max-w-container mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">
      <a href="index.html" class="flex items-center gap-2 font-extrabold text-xl text-primary">
        Aqari <span class="text-accent font-arabic">| عقاري</span>
      </a>
      <div class="hidden md:flex items-center gap-7 text-sm font-medium">
        <a href="index.html" class="text-text-muted hover:text-primary" data-i18n="nav.home">Accueil</a>
        <a href="listings.html" class="text-primary" data-i18n="nav.listings">Annonces</a>
        <a href="post-listing.html" class="text-text-muted hover:text-primary" data-i18n="nav.post_listing">Publier</a>      </div>
      <div class="flex items-center gap-2">
        <button data-lang-toggle class="px-3 py-1.5 text-sm font-bold rounded-card border border-border-subtle hover:border-primary text-primary">
          <span data-i18n="nav.lang_toggle">عر</span>
        </button>
        <button data-mobile-toggle class="md:hidden p-2 text-primary" aria-label="Menu">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
    </nav>
    <div data-mobile-menu class="hidden md:hidden border-t border-border-subtle px-4 py-3 flex-col gap-3 text-sm font-medium bg-surface">
      <a href="index.html" class="block py-1" data-i18n="nav.home">Accueil</a>
      <a href="listings.html" class="block py-1" data-i18n="nav.listings">Annonces</a>
      <a href="post-listing.html" class="block py-1" data-i18n="nav.post_listing">Publier</a>    </div>
  </header>

  <main class="max-w-container mx-auto px-4 sm:px-6 py-8 w-full flex-1">
    <div class="grid lg:grid-cols-[280px_1fr] gap-8">

      <!-- Filters sidebar -->
      <aside class="lg:sticky lg:top-24 h-fit">
        <div class="bg-surface border border-border-subtle rounded-panel p-5">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-bold text-primary inline-flex items-center gap-2">
              <span class="material-symbols-outlined !text-lg">tune</span><span data-i18n="filters.title">Filtres</span>
            </h2>
            <button id="reset-filters" class="text-xs font-semibold text-accent hover:underline" data-i18n="filters.reset">Réinitialiser</button>
          </div>

          <form id="filters" class="space-y-5 text-sm">
            <!-- Keyword search -->
            <div>
              <p class="font-semibold mb-2 text-text-muted uppercase text-xs tracking-wide" data-i18n="filters.search">Recherche</p>
              <div class="relative">
                <span class="material-symbols-outlined !text-lg absolute top-2 left-2 rtl:left-auto rtl:right-2 text-text-muted">search</span>
                <input type="text" name="q" class="aq-input w-full bg-bg rounded-card pl-9 rtl:pl-3 rtl:pr-9 pr-3 py-2 border border-border-subtle" data-i18n-placeholder="hero.search_placeholder" placeholder="Rechercher un bien...">
              </div>
            </div>

            <!-- Transaction -->
            <div>
              <p class="font-semibold mb-2 text-text-muted uppercase text-xs tracking-wide" data-i18n="filters.transaction">Transaction</p>
              <div class="flex bg-bg rounded-card p-1 font-semibold">
                <label class="flex-1"><input type="radio" name="transaction" value="" class="peer sr-only" checked><span class="block text-center px-2 py-1.5 rounded-card cursor-pointer peer-checked:bg-primary peer-checked:text-white text-text-muted" data-i18n="filters.all_types">Tous</span></label>
                <label class="flex-1"><input type="radio" name="transaction" value="location" class="peer sr-only"><span class="block text-center px-2 py-1.5 rounded-card cursor-pointer peer-checked:bg-primary peer-checked:text-white text-text-muted" data-i18n="filters.location">Location</span></label>
                <label class="flex-1"><input type="radio" name="transaction" value="vente" class="peer sr-only"><span class="block text-center px-2 py-1.5 rounded-card cursor-pointer peer-checked:bg-primary peer-checked:text-white text-text-muted" data-i18n="filters.vente">Vente</span></label>
              </div>
            </div>

            <!-- Type checkboxes -->
            <div>
              <p class="font-semibold mb-2 text-text-muted uppercase text-xs tracking-wide" data-i18n="filters.property_type">Type de bien</p>
              <div id="type-checks" class="space-y-2"></div>
            </div>

            <!-- Location -->
            <div>
              <p class="font-semibold mb-2 text-text-muted uppercase text-xs tracking-wide" data-i18n="filters.location_label">Zone</p>
              <select name="location" class="aq-input w-full bg-bg rounded-card px-3 py-2 border border-border-subtle">
                <option value="" data-i18n="filters.all_locations">Toutes les zones</option>
              </select>
            </div>

            <!-- Price range -->
            <div>
              <p class="font-semibold mb-2 text-text-muted uppercase text-xs tracking-wide" data-i18n="filters.price">Prix (MRU)</p>
              <div class="flex gap-2">
                <input type="number" name="price_min" min="0" class="aq-input w-full bg-bg rounded-card px-3 py-2 border border-border-subtle" data-i18n-placeholder="filters.price_min" placeholder="Min">
                <input type="number" name="price_max" min="0" class="aq-input w-full bg-bg rounded-card px-3 py-2 border border-border-subtle" data-i18n-placeholder="filters.price_max" placeholder="Max">
              </div>
            </div>

            <!-- Rooms -->
            <div>
              <p class="font-semibold mb-2 text-text-muted uppercase text-xs tracking-wide" data-i18n="filters.rooms">Chambres</p>
              <div class="flex gap-2" id="rooms-group">
                <label><input type="radio" name="rooms" value="" class="peer sr-only" checked><span class="block px-3 py-1.5 rounded-card border border-border-subtle cursor-pointer peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary">—</span></label>
                <label><input type="radio" name="rooms" value="1" class="peer sr-only"><span class="block px-3 py-1.5 rounded-card border border-border-subtle cursor-pointer peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary">1+</span></label>
                <label><input type="radio" name="rooms" value="2" class="peer sr-only"><span class="block px-3 py-1.5 rounded-card border border-border-subtle cursor-pointer peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary">2+</span></label>
                <label><input type="radio" name="rooms" value="3" class="peer sr-only"><span class="block px-3 py-1.5 rounded-card border border-border-subtle cursor-pointer peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary">3+</span></label>
                <label><input type="radio" name="rooms" value="4" class="peer sr-only"><span class="block px-3 py-1.5 rounded-card border border-border-subtle cursor-pointer peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary">4+</span></label>
              </div>
            </div>
          </form>
        </div>
      </aside>

      <!-- Results -->
      <section>
        <div class="flex items-center justify-between mb-5 gap-4 flex-wrap">
          <p class="text-text-muted text-sm"><span id="result-count" class="font-bold text-primary">0</span> <span data-i18n="sort.showing">annonces</span></p>
          <label class="text-sm inline-flex items-center gap-2">
            <span class="text-text-muted" data-i18n="sort.label">Trier par</span>
            <select id="sort" class="aq-input bg-surface rounded-card px-3 py-2 border border-border-subtle font-medium">
              <option value="recent" data-i18n="sort.recent">Plus récent</option>
              <option value="price_asc" data-i18n="sort.price_asc">Prix croissant</option>
              <option value="price_desc" data-i18n="sort.price_desc">Prix décroissant</option>
            </select>
          </label>
        </div>
        <div id="results" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        <div id="load-more-wrap" class="text-center mt-8 hidden">
          <button id="load-more" class="bg-primary hover:bg-primary-dark text-white font-bold px-8 py-3 rounded-card" data-i18n="sort.load_more">Voir plus</button>
        </div>
      </section>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-primary text-white/80">
    <div class="border-t border-white/10 py-4 text-center text-xs">
      © 2026 Aqari. <span data-i18n="footer.rights">Tous droits réservés.</span>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/listings.js"></script>
</body>
</html>
